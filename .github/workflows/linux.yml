name: Build KiCk Linux
on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Загружаем код из репозитория
      - uses: actions/checkout@v4

      # 2. Устанавливаем Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Устанавливаем все библиотеки 
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libnotify-dev libsecret-1-dev libjsoncpp-dev liblzma-dev

      - name: Create Linux support
        run: flutter create --platforms=linux .

      # 4. Получаем пакеты
      - run: flutter pub get

      # 5. Собираем проект под Linux
      - run: flutter build linux --release

      # 6. Сохраняем результат, чтобы его можно было скачать
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: kick-linux-app
          path: build/linux/x64/release/bundle/
