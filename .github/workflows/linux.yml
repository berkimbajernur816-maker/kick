name: Build KiCk Linux
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libnotify-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            liblzma-dev \
            libcurl4-openssl-dev

      - name: Create Linux support
        run: flutter create --platforms=linux .

      - name: Get packages
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: kick-linux-app
          path: build/linux/x64/release/bundle/
